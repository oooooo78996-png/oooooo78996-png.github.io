<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-WORLD | Video Player</title>
    <style>
        body { background: #000; color: #fff; margin: 0; font-family: sans-serif; text-align: center; }
        .ad-container { width: 100%; min-height: 100px; background: #111; margin: 10px 0; display: flex; justify-content: center; align-items: center; }
        #vBox { width: 100%; max-width: 600px; margin: 20px auto; position: relative; padding: 10px; }
        
        /* অ্যাড স্ক্রিন স্টাইল */
        #ad-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 99; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 10px; }
        #timer { font-size: 20px; color: #ff0000; margin-top: 15px; font-weight: bold; }
        
        /* ভিডিও প্লেয়ার */
        video { width: 100%; border-radius: 10px; box-shadow: 0 0 20px rgba(255,0,0,0.2); }
        .v-title { padding: 15px; font-size: 18px; font-weight: bold; }
        #play-btn { background: #ff0000; color: #fff; padding: 15px 30px; border: none; border-radius: 5px; cursor: pointer; font-size: 18px; margin-top: 20px; display: none; }
    </style>
</head>
<body>

<div class="ad-container" id="top-banner">
    </div>

<div id="vBox">
    <div class="v-title" id="videoTitle">ভিডিও লোড হচ্ছে...</div>
    
    <div id="player-area" style="position: relative;">
        <div id="ad-screen">
            <div id="ad-content" style="width:300px; height:250px; background:#222;">
                <p style="padding:20px; color:#666;">এখানে অ্যাড লোড হবে</p>
            </div>
            <div id="timer">অপেক্ষা করুন...</div>
        </div>

        <video id="mainVideo" controls poster="https://via.placeholder.com/600x340/000/fff?text=Click+to+Play">
            আপনার ব্রাউজার ভিডিও সাপোর্ট করে না।
        </video>
    </div>
</div>

<div class="ad-container" id="bottom-banner">
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBWhYvIKGHfDO4NrH0G5N692FljzD_wmZc",
        authDomain: "misti-am.firebaseapp.com",
        projectId: "misti-am",
        storageBucket: "misti-am.firebasestorage.app",
        messagingSenderId: "335857181187",
        appId: "1:335857181187:web:eee24712600f7018262436"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // URL থেকে ভিডিও ID নেওয়া
    const urlParams = new URLSearchParams(window.location.search);
    const videoId = urlParams.get('id');

    async function loadVideo() {
        if (!videoId) {
            document.getElementById('videoTitle').innerText = "ভুল লিঙ্ক! আইডি পাওয়া যায়নি।";
            return;
        }

        const docRef = doc(db, "userVideos", videoId);
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {
            const data = docSnap.data();
            document.getElementById('videoTitle').innerText = data.title;
            document.getElementById('mainVideo').src = data.url;
            
            // টাইমার শুরু
            startTimer(data.adLink);
        } else {
            document.getElementById('videoTitle').innerText = "ভিডিওটি খুঁজে পাওয়া যায়নি!";
        }
    }

    function startTimer(adUrl) {
        let count = 7; // ৭ সেকেন্ডের টাইমার
        const timerTxt = document.getElementById('timer');
        const adScreen = document.getElementById('ad-screen');

        const countdown = setInterval(() => {
            timerTxt.innerText = count + " সেকেন্ড পর ভিডিও শুরু হবে...";
            count--;

            if (count < 0) {
                clearInterval(countdown);
                // অ্যাড স্ক্রিন গায়েব করে দেওয়া
                adScreen.style.display = 'none';
                
                // ইচ্ছা করলে ভিডিওর উপরে ক্লিক করলে ডিরেক্ট লিঙ্ক ওপেন হবে এমন সিস্টেম করা যায়
                console.log("Ad Link was: " + adUrl); 
            }
        }, 1000);
    }

    loadVideo();
</script>

</body>
</html>
