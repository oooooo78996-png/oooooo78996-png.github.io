<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-WORLD | Video</title>
    <style>
        body { background: #000; color: #fff; margin: 0; font-family: sans-serif; text-align: center; }
        #vBox { width: 100%; max-width: 600px; margin: 20px auto; position: relative; }
        
        /* এই পর্দাটাই সরছে না, তাই এখানে z-index আর display ঠিক করলাম */
        #ad-screen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 999; display: flex; 
            flex-direction: column; justify-content: center; align-items: center; 
        }
        
        video { width: 100%; display: block; border-radius: 8px; }
        #timer { font-size: 22px; color: #ff0000; margin-top: 15px; font-weight: bold; }
        .v-title { padding: 10px; font-size: 18px; }
    </style>
</head>
<body>

<div id="vBox">
    <div class="v-title" id="videoTitle">লোডিং...</div>
    
    <div style="position: relative;">
        <div id="ad-screen">
            <div id="ad-box" style="width:300px; height:250px; background:#1a1a1a; border:1px solid #333;">
                <p style="color:#444; margin-top:100px;">অ্যাড লোড হচ্ছে...</p>
            </div>
            <div id="timer">অপেক্ষা করুন...</div>
        </div>

        <video id="mainVideo" controls autoplay></video>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBWhYvIKGHfDO4NrH0G5N692FljzD_wmZc",
        authDomain: "misti-am.firebaseapp.com",
        projectId: "misti-am",
        storageBucket: "misti-am.firebasestorage.app",
        messagingSenderId: "335857181187",
        appId: "1:335857181187:web:eee24712600f7018262436"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const urlParams = new URLSearchParams(window.location.search);
    const videoId = urlParams.get('id');

    async function loadVideo() {
        if (!videoId) return;

        try {
            const docRef = doc(db, "userVideos", videoId);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                const data = docSnap.data();
                document.getElementById('videoTitle').innerText = data.title;
                const videoElement = document.getElementById('mainVideo');
                videoElement.src = data.url;

                // ভিডিওর সোর্স পাওয়ার পর টাইমার শুরু
                let count = 5;
                const timerTxt = document.getElementById('timer');
                const screen = document.getElementById('ad-screen');

                const countdown = setInterval(() => {
                    timerTxt.innerText = count + " সেকেন্ড বাকি...";
                    count--;

                    if (count < 0) {
                        clearInterval(countdown);
                        // জোর করে পর্দা সরিয়ে দেওয়া
                        screen.setAttribute("style", "display: none !important;");
                        videoElement.play(); // অটো প্লে করার চেষ্টা
                    }
                }, 1000);

            }
        } catch (e) {
            console.log("Error:", e);
        }
    }

    loadVideo();
</script>
</body>
</html>
